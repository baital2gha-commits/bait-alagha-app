<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيت الآغا - Bait Al-Agha</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="promo-bar">
        <div class="promo-track">
            <span>✨ خصومات حصرية بمناسبة الافتتاح ✨</span>
            <span>🚚 خدمة التوصيل سريعة لجميع المناطق 🚚</span>
            <span>💎 بيت الآغا.. كل ما تحتاجه لبيت أكثر أناقة 💎</span>
            <span>✨ خصومات حصرية بمناسبة الافتتاح ✨</span>
        </div>
    </div>

    <header>
        <div class="logo-container">
            <h1 class="brand-name">بيت الآغا</h1>
            <p class="brand-slogan">للمستلزمات والأدوات المنزلية</p>
        </div>
    </header>

    <nav id="category-nav" class="tabs-container"></nav>

    <main>
        <div id="products-grid" class="products-grid">
            <div class="loader">جاري تحميل تشكيلة بيت الآغا...</div>
        </div>
    </main>

    <div id="cart-floating-btn" class="cart-fab">
        <div class="cart-icon-wrapper">
            🛒
            <span id="cart-count" class="cart-badge">0</span>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 style="color:var(--gold); text-align:center;">🛒 سلة بيت الآغا</h2>
            
            <div id="cart-items-list">
                </div>
            
            <hr style="border:0.5px solid #444; margin:15px 0;">
            
            <div id="order-form" class="order-form">
                <input type="text" id="cust-name" placeholder="الاسم بالكامل 👤" required>
                <input type="tel" id="cust-phone" placeholder="رقم الواتساب 📱" required>
                
                <button id="get-loc-btn" type="button" style="background:#444; color:white; border:1px solid var(--gold); width:100%; padding:12px; border-radius:8px; margin-bottom:10px; font-family:'Cairo'; cursor:pointer;">
                    📍 تحديد موقعي الحالي تلقائياً
                </button>
                
                <textarea id="cust-location" placeholder="العنوان بالتفصيل (أو سيظهر الموقع هنا) 🏠" required></textarea>
                
                <button id="submit-order-btn" class="submit-btn">تأكيد الطلب عبر واتساب ✅</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
